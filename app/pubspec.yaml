name: hidrored
description: "Sistema de gestion para acueductos veredales (offline-first)"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ----- Estado y ruteo -----
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0

  # ----- Backend (Supabase) -----
  supabase_flutter: ^2.5.0

  # ----- Paths (lo necesitaremos cuando se agregue drift en fase offline) -----
  path_provider: ^2.1.3
  path: ^1.9.0

  # NOTE: drift + sqlite_flutter_libs + powersync se agregan cuando se
  # implemente la capa offline-first (post-MVP nucleo). Actualmente la app
  # opera online directo contra Supabase.

  # ----- PDFs (recibos) -----
  pdf: ^3.10.8
  printing: ^5.12.0

  # ----- Compartir (WhatsApp, etc.) -----
  url_launcher: ^6.2.6
  share_plus: ^9.0.0

  # ----- Reportes / charts -----
  fl_chart: ^0.68.0

  # ----- Formularios -----
  flutter_form_builder: ^10.0.0
  form_builder_validators: ^11.0.0

  # ----- Importacion Excel -----
  file_picker: ^8.0.3
  excel: ^4.0.2

  # ----- Modelos inmutables -----
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # ----- Utilidades -----
  intl: ^0.20.0
  uuid: ^4.4.0
  collection: ^1.18.0
  logger: ^2.3.0
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.10
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  # Lints adicionales
  riverpod_lint: ^2.3.10
  custom_lint: ^0.6.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
